# Add a warning to the issue description when the issue is labeled "Needs ...",
# and remove it again if all such labels are removed.
name: "Add or remove no-contribution warning"

permissions:
  issues: write

on:
  issues:
    types: [labeled, unlabeled]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPO: ${{ github.repository }}
  ISSUE_NUMBER: ${{ github.event.issue.number }}
  WARNING_MESSAGE: >
    >[!WARNING]

    >This issue is not (yet) open for contribution. If you are looking to contribute,
    please have a look at our [contributing doc](https://scikit-learn.org/dev/developers/contributing.html)
    and in particular the section for [new contributors](https://scikit-learn.org/dev/developers/contributing.html#new-contributors).

jobs:
  add_no_contribution_warning:
    runs-on: ubuntu-latest
    if: github.event.action == 'labeled' && startsWith(github.event.label.name, 'Needs')
    steps:
      - name: Add no-contribution warning
        run: |
          body="$(gh issue view "$ISSUE_NUMBER" --json body --jq .body)"
          if [[ "$body" != "$WARNING_MESSAGE"* ]]; then
            new_body="$WARNING_MESSAGE$body"
            gh issue edit "$ISSUE_NUMBER" --body "$new_body"
          fi

  remove_no_contribution_warning:
    runs-on: ubuntu-latest
    if: github.event.action == 'unlabeled' && startsWith(github.event.label.name, 'Needs')
    steps:
      - name: Remove no-contribution warning
        run: |
          has_needs_label="$(gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name | select(startswith("Needs"))' | head -n 1)"
          if [[ -z "$has_needs_label" ]]; then
            body="$(gh issue view "$ISSUE_NUMBER" --json body --jq .body)"
            if [[ "$body" == "$WARNING_MESSAGE"* ]]; then
              new_body="${body#"$WARNING_MESSAGE"}"
              gh issue edit "$ISSUE_NUMBER" --body "$new_body"
            fi
          fi
